name: Publish to npm

# Same release tag as Python: v0.5.0 → @homecloud-platform/sdk@0.5.0
# Optional npm-only hotfix tag: js-v0.5.1 (does not publish PyPI)
on:
  push:
    tags:
      - "v*"
      - "js-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 0.5.0). Leave empty to use tag / package.json."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Resolve version from tag or input
        id: ver
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == js-v* ]]; then
            VER="${GITHUB_REF_NAME#js-v}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="$(node -p "require('./js/package.json').version")"
          fi
          if [[ ! "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid version: $VER" >&2
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Publishing @homecloud-platform/sdk@$VER"

      - name: Sync package.json version
        run: npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Test
        run: npm test

      # OIDC Trusted Publisher: workflow filename publish-npm.yml, environment npm
      - name: Publish
        run: npm publish --access public
